name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (type-check + production build)
        run: npm run build
      - name: Engine stress tests
        run: npm run stress
      - name: Simulate games + invariants
        run: npm run simulate
